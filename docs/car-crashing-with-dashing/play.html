<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>car crashing with dashing</title>
    <meta name="description" content="car crashing with dashing — play in your browser." />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #22c55e;
        color: #14532d;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 420px; }
      h1 { font-size: 2rem; margin-bottom: 8px; }
      a {
        display: inline-block;
        background: #14532d;
        color: #dcfce7;
        font-weight: 800;
        font-size: 1.25rem;
        padding: 18px 32px;
        border-radius: 14px;
        text-decoration: none;
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      }
      .hint { margin-top: 18px; font-size: 0.95rem; opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>car crashing with dashing</h1>
      <p class="hint" style="margin-bottom:20px">Loading game...</p>
      <a href="index.html" id="play-link">Play now</a>
    </div>
    <script>
      const params = new URLSearchParams(location.search);

      function buildTarget() {
        if (params.has('teleport') && !params.has('room')) {
          return 'index.html?teleport=1';
        }
        const qs = params.toString();
        return qs ? `index.html?${qs}` : 'index.html';
      }

      const target = buildTarget();

      if (params.has('teleport') && !params.has('room')) {
        window.open(target, '_blank', 'noopener');
        document.querySelector('.hint').textContent = 'Opened in a new tab — your other tabs are still there.';
      } else {
        window.location.replace(target);
      }

      document.getElementById('play-link').href = target;
      document.getElementById('play-link').addEventListener('click', (e) => {
        e.preventDefault();
        window.open(target, '_blank', 'noopener');
      });
    </script>
  </body>
</html>
