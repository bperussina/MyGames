<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>car crashing with dashing</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        overflow: hidden;
        background: #22c55e;
        font-family: system-ui, sans-serif;
      }

      #controller-map {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        flex-direction: column;
        background: #0f172a;
        color: #e2e8f0;
        padding: 20px 24px 28px;
        overflow: auto;
      }

      .cm-header h1 {
        font-size: 1.5rem;
        margin-bottom: 6px;
      }

      .cm-header p {
        color: #94a3b8;
        margin-bottom: 16px;
      }

      .cm-body {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        flex: 1;
        align-items: flex-start;
        justify-content: center;
      }

      .cm-pad-wrap {
        flex: 0 1 520px;
        max-width: 100%;
      }

      .cm-svg {
        width: 100%;
        height: auto;
        display: block;
      }

      .cm-fields {
        flex: 1 1 320px;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .cm-row {
        display: grid;
        grid-template-columns: 24px 110px 1fr;
        align-items: center;
        gap: 8px;
      }

      .cm-line {
        display: block;
        width: 20px;
        height: 2px;
        background: #64748b;
      }

      .cm-label {
        font-size: 0.85rem;
        font-weight: 700;
        color: #cbd5e1;
      }

      .cm-input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 2px solid #334155;
        background: #1e293b;
        color: #f8fafc;
        font-size: 0.95rem;
      }

      .cm-input:focus {
        outline: none;
        border-color: #22c55e;
      }

      .cm-done {
        margin-top: 20px;
        align-self: center;
        padding: 14px 28px;
        font-size: 1.1rem;
        font-weight: 800;
        border: none;
        border-radius: 12px;
        background: #22c55e;
        color: #14532d;
        cursor: pointer;
      }

      .cm-done:hover {
        background: #4ade80;
      }

      #action-toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(15, 23, 42, 0.92);
        color: #fde047;
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: 700;
        z-index: 50;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s;
      }

      #action-toast.show {
        opacity: 1;
      }

      #map-hint {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 40;
        padding: 8px 14px;
        background: rgba(15, 23, 42, 0.75);
        color: #dcfce7;
        border-radius: 8px;
        font-size: 0.85rem;
        pointer-events: none;
      }

      #hud {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 40;
        padding: 10px 18px;
        background: rgba(15, 23, 42, 0.72);
        color: #dcfce7;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 700;
        pointer-events: none;
        white-space: nowrap;
      }

      #world-canvas {
        z-index: 1;
      }

      #title-canvas {
        z-index: 2;
      }

      .garage-box {
        position: fixed;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 45;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 10px;
        border: 3px solid #14532d;
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.88);
        cursor: pointer;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
      }

      .garage-box:hover {
        border-color: #22c55e;
        background: rgba(15, 23, 42, 0.95);
      }

      .garage-box img {
        display: block;
        width: 120px;
        height: auto;
        border-radius: 6px;
      }

      .garage-label {
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        color: #dcfce7;
      }

      .garage-box[hidden] {
        display: none !important;
      }

      #car-garage {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 110;
        background: rgba(15, 23, 42, 0.94);
        padding: 20px;
        overflow: auto;
        justify-content: center;
      }

      .garage-panel {
        width: min(960px, 100%);
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .garage-header h1 {
        font-size: 1.6rem;
        color: #f8fafc;
        margin-bottom: 4px;
      }

      .garage-header p {
        color: #94a3b8;
        margin-bottom: 12px;
      }

      .garage-search {
        width: 100%;
        max-width: 400px;
        padding: 10px 14px;
        border-radius: 10px;
        border: 2px solid #334155;
        background: #1e293b;
        color: #f8fafc;
        font-size: 1rem;
      }

      .garage-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 10px;
        max-height: 60vh;
        overflow-y: auto;
        padding: 4px;
      }

      .garage-car {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        padding: 12px 14px;
        border: 2px solid #334155;
        border-radius: 12px;
        background: #1e293b;
        color: #e2e8f0;
        cursor: pointer;
        text-align: left;
      }

      .garage-car:hover {
        border-color: #22c55e;
        background: #243044;
      }

      .garage-car[hidden] {
        display: none;
      }

      .garage-car-year {
        font-size: 0.75rem;
        color: #94a3b8;
        font-weight: 700;
      }

      .garage-car-name {
        font-size: 0.9rem;
        font-weight: 800;
        color: #f8fafc;
      }

      .garage-car-maker {
        font-size: 0.78rem;
        color: #64748b;
      }

      .garage-close {
        align-self: center;
        margin-top: 8px;
        padding: 12px 28px;
        font-size: 1rem;
        font-weight: 800;
        border: none;
        border-radius: 12px;
        background: #22c55e;
        color: #14532d;
        cursor: pointer;
      }

      .garage-close:hover {
        background: #4ade80;
      }

      #multiplayer-lobby {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        pointer-events: none;
      }

      .lobby-panel {
        pointer-events: auto;
        width: min(420px, 100%);
        padding: 28px 26px;
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.94);
        border: 3px solid #22c55e;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        text-align: center;
      }

      .lobby-title {
        font-size: 2rem;
        font-weight: 900;
        color: #4ade80;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }

      .lobby-sub {
        color: #94a3b8;
        font-size: 0.95rem;
        margin-bottom: 20px;
      }

      .lobby-btn {
        display: block;
        width: 100%;
        padding: 14px 20px;
        margin-bottom: 10px;
        font-size: 1.05rem;
        font-weight: 800;
        border: none;
        border-radius: 12px;
        cursor: pointer;
      }

      .lobby-btn-host {
        background: linear-gradient(135deg, #fde047, #facc15);
        color: #422006;
      }

      .lobby-btn-host:hover {
        filter: brightness(1.05);
      }

      .lobby-btn-go {
        background: #22c55e;
        color: #14532d;
        margin-top: 12px;
      }

      .lobby-btn-join {
        background: #3b82f6;
        color: #fff;
        width: auto;
        flex: 0 0 auto;
        padding: 12px 18px;
        margin: 0;
      }

      .lobby-host-info {
        margin: 16px 0;
        padding: 14px;
        border-radius: 12px;
        background: #1e293b;
        text-align: left;
      }

      .lobby-label {
        font-size: 0.78rem;
        color: #94a3b8;
        margin-bottom: 4px;
      }

      .lobby-code {
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: 0.2em;
        color: #fde047;
        margin-bottom: 12px;
        text-align: center;
      }

      .lobby-link-row {
        display: flex;
        gap: 8px;
        margin-bottom: 4px;
      }

      .lobby-link {
        flex: 1;
        padding: 8px 10px;
        border-radius: 8px;
        border: 2px solid #334155;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 0.75rem;
      }

      .lobby-copy {
        padding: 8px 14px;
        border: none;
        border-radius: 8px;
        background: #475569;
        color: #f8fafc;
        font-weight: 700;
        cursor: pointer;
      }

      .lobby-divider {
        margin: 18px 0 14px;
        color: #64748b;
        font-size: 0.85rem;
        font-weight: 600;
      }

      .lobby-join-row {
        display: flex;
        gap: 8px;
      }

      .lobby-code-input {
        flex: 1;
        padding: 12px 14px;
        border-radius: 10px;
        border: 2px solid #334155;
        background: #1e293b;
        color: #f8fafc;
        font-size: 1.1rem;
        font-weight: 800;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        text-align: center;
      }

      .lobby-status {
        margin-top: 14px;
        min-height: 1.2em;
        font-size: 0.85rem;
        color: #94a3b8;
      }

      #room-banner {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 45;
        padding: 10px 18px;
        background: rgba(15, 23, 42, 0.88);
        color: #dcfce7;
        border-radius: 10px;
        font-size: 0.9rem;
        max-width: 95vw;
        text-align: center;
      }

      #room-banner a {
        color: #fde047;
        font-weight: 700;
      }

      #room-banner[hidden] {
        display: none;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-MpfnP1HD.js"></script>
  </head>
  <body>
    <div id="action-toast"></div>
    <div id="hud" hidden>Arrows/WASD move</div>
    <div id="map-hint" hidden>Menu = controller map</div>
    <div id="room-banner" hidden></div>
  </body>
</html>
