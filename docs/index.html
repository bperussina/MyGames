<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Games</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 40px 24px;
      }
      h1 { font-size: 2rem; margin-bottom: 8px; }
      .lead { color: #94a3b8; margin-bottom: 12px; line-height: 1.5; }
      .note {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 14px 16px;
        margin-bottom: 24px;
        font-size: 0.95rem;
        color: #cbd5e1;
        line-height: 1.5;
      }
      .public {
        background: #14532d;
        border-color: #22c55e;
        color: #dcfce7;
        margin-bottom: 24px;
      }
      .public a { color: #fde047; }
      .grid { display: grid; gap: 16px; max-width: 520px; }
      a.game {
        display: block;
        padding: 20px 22px;
        border-radius: 14px;
        text-decoration: none;
        color: inherit;
        font-weight: 700;
        font-size: 1.15rem;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      }
      .br2 { background: linear-gradient(135deg, #166534, #22c55e); color: #fff; }
      .car { background: linear-gradient(135deg, #15803d, #4ade80); color: #14532d; }
      .sub { display: block; font-size: 0.85rem; font-weight: 500; opacity: 0.9; margin-top: 6px; }
      .open-all {
        margin-top: 20px;
        display: inline-block;
        background: #facc15;
        color: #422006;
        border: none;
        border-radius: 12px;
        padding: 14px 20px;
        font-weight: 800;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>My Games</h1>
    <p class="lead">Bookmark this page. Reload anytime — it keeps working.</p>

    <div class="note public" id="public-box" hidden>
      <strong>Your play link:</strong><br />
      <a id="public-hub" href="#">loading...</a>
    </div>

    <div class="grid" id="game-grid">
      <a class="game br2" id="br2-link" href="./babys-revenge-2/play.html" target="_blank" rel="noopener">
        Baby's Revenge 2
        <span class="sub">Click to play</span>
      </a>
      <a class="game car" id="car-link" href="./car-crashing-with-dashing/index.html" target="_blank" rel="noopener">
        car crashing with dashing
        <span class="sub">Click to play</span>
      </a>
    </div>

    <button type="button" class="open-all" id="open-all">Open both games in new tabs</button>

    <script>
      let br2 = './babys-revenge-2/play.html';
      let car = './car-crashing-with-dashing/index.html';

      fetch('./tunnel.json')
        .then((r) => (r.ok ? r.json() : null))
        .catch(() => null)
        .then((t) => {
          if (!t?.hub) return;
          document.getElementById('public-box').hidden = false;
          const hub = document.getElementById('public-hub');
          hub.href = t.hub;
          hub.textContent = t.hub;
          if (t.br2) {
            br2 = t.br2;
            document.getElementById('br2-link').href = t.br2;
          }
          if (t.car) {
            car = t.car;
            document.getElementById('car-link').href = t.car;
          }
        });

      document.getElementById('open-all').addEventListener('click', () => {
        window.open(br2, '_blank', 'noopener');
        window.open(car, '_blank', 'noopener');
      });
    </script>
  </body>
</html>
