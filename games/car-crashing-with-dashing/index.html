<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>car crashing with dashing</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        overflow: hidden;
        background: #22c55e;
        font-family: system-ui, sans-serif;
      }

      #controller-map {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        flex-direction: column;
        background: #0f172a;
        color: #e2e8f0;
        padding: 20px 24px 28px;
        overflow: auto;
      }

      .cm-header h1 {
        font-size: 1.5rem;
        margin-bottom: 6px;
      }

      .cm-header p {
        color: #94a3b8;
        margin-bottom: 16px;
      }

      .cm-body {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        flex: 1;
        align-items: flex-start;
        justify-content: center;
      }

      .cm-pad-wrap {
        flex: 0 1 520px;
        max-width: 100%;
      }

      .cm-svg {
        width: 100%;
        height: auto;
        display: block;
      }

      .cm-fields {
        flex: 1 1 320px;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .cm-row {
        display: grid;
        grid-template-columns: 24px 110px 1fr;
        align-items: center;
        gap: 8px;
      }

      .cm-line {
        display: block;
        width: 20px;
        height: 2px;
        background: #64748b;
      }

      .cm-label {
        font-size: 0.85rem;
        font-weight: 700;
        color: #cbd5e1;
      }

      .cm-input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 2px solid #334155;
        background: #1e293b;
        color: #f8fafc;
        font-size: 0.95rem;
      }

      .cm-input:focus {
        outline: none;
        border-color: #22c55e;
      }

      .cm-done {
        margin-top: 20px;
        align-self: center;
        padding: 14px 28px;
        font-size: 1.1rem;
        font-weight: 800;
        border: none;
        border-radius: 12px;
        background: #22c55e;
        color: #14532d;
        cursor: pointer;
      }

      .cm-done:hover {
        background: #4ade80;
      }

      #action-toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(15, 23, 42, 0.92);
        color: #fde047;
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: 700;
        z-index: 50;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s;
      }

      #action-toast.show {
        opacity: 1;
      }

      #map-hint {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 40;
        padding: 8px 14px;
        background: rgba(15, 23, 42, 0.75);
        color: #dcfce7;
        border-radius: 8px;
        font-size: 0.85rem;
        pointer-events: none;
      }

      #hud {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 40;
        padding: 10px 18px;
        background: rgba(15, 23, 42, 0.72);
        color: #dcfce7;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 700;
        pointer-events: none;
        white-space: nowrap;
      }

      #world-canvas {
        z-index: 1;
      }

      #title-canvas {
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div id="action-toast"></div>
    <div id="hud" hidden>driving coming soon</div>
    <div id="map-hint" hidden>Menu = controller map</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
