<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>car crashing with dashing</title>
    <meta name="description" content="car crashing with dashing — play in your browser." />
    <meta name="apple-mobile-web-app-title" content="car crashing with dashing" />
    <meta property="og:title" content="car crashing with dashing" />
    <meta property="og:description" content="Tap to play car crashing with dashing!" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #22c55e;
        color: #14532d;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 420px; }
      h1 { font-size: 2rem; margin-bottom: 8px; }
      .sub { font-size: 1.05rem; margin-bottom: 24px; }
      a, button {
        display: inline-block;
        background: #14532d;
        color: #dcfce7;
        font-weight: 800;
        font-size: 1.25rem;
        padding: 18px 32px;
        border-radius: 14px;
        text-decoration: none;
        border: none;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      }
      .hint { margin-top: 18px; font-size: 0.95rem; opacity: 0.85; }
      .teleport-msg { font-size: 1.1rem; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <h1>car crashing with dashing</h1>
      <p class="sub">Tap below to play</p>
      <a href="index.html?teleport=1" id="play-link">Play</a>
      <p class="hint">Works on iPad, phone, and laptop</p>
    </div>
    <script>
      const params = new URLSearchParams(location.search);
      const teleport = params.has('teleport');
      const playUrl = 'index.html?teleport=1';

      if (teleport) {
        window.open(playUrl, '_blank', 'noopener');
        document.getElementById('card').innerHTML = `
          <h1>car crashing with dashing</h1>
          <p class="teleport-msg">Teleported — check your <strong>new tab</strong>.</p>
          <p class="hint">Baby's Revenge 2 is still on its own tab.</p>
          <p style="margin-top:20px"><a href="${playUrl}" target="_blank" rel="noopener">Open again</a></p>
        `;
      } else if (!/bot|crawl|preview|facebook|twitter|slack/i.test(navigator.userAgent)) {
        setTimeout(() => { window.location.replace(playUrl); }, 600);
      }

      document.getElementById('play-link')?.addEventListener('click', (event) => {
        event.preventDefault();
        window.open(playUrl, '_blank', 'noopener');
      });
    </script>
  </body>
</html>
