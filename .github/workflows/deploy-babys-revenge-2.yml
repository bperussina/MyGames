name: Deploy Baby's Revenge 2

on:
  push:
    branches:
      - main
      - cursor/game-monorepo-setup-e0a9
    paths:
      - 'games/babys-revenge-2/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-babys-revenge-2.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-babys-revenge-2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build game for GitHub Pages
        run: GH_PAGES=1 npm run build -- babys-revenge-2

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: games/babys-revenge-2/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
