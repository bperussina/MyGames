<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Games</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 40px 24px;
      }
      h1 { font-size: 2rem; margin-bottom: 8px; }
      .lead { color: #94a3b8; margin-bottom: 12px; line-height: 1.5; }
      .note {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 14px 16px;
        margin-bottom: 24px;
        font-size: 0.95rem;
        color: #cbd5e1;
      }
      .grid { display: grid; gap: 16px; max-width: 520px; }
      a {
        display: block;
        padding: 20px 22px;
        border-radius: 14px;
        text-decoration: none;
        color: inherit;
        font-weight: 700;
        font-size: 1.15rem;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        transition: transform 0.15s ease;
      }
      a:hover { transform: translateY(-2px); }
      .br2 { background: linear-gradient(135deg, #166534, #22c55e); color: #fff; }
      .car { background: linear-gradient(135deg, #15803d, #4ade80); color: #14532d; }
      .sub { display: block; font-size: 0.85rem; font-weight: 500; opacity: 0.9; margin-top: 6px; }
      .status { font-size: 0.8rem; margin-top: 8px; font-weight: 600; }
      .ok { color: #86efac; }
      .bad { color: #fca5a5; }
      .open-all {
        margin-top: 20px;
        display: inline-block;
        background: #facc15;
        color: #422006;
        border: none;
        border-radius: 12px;
        padding: 14px 20px;
        font-weight: 800;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>My Games</h1>
    <p class="lead">Bookmark this page to get your game tabs back anytime.</p>
    <p class="note">These games run locally on your computer — not on a remote server. If a tab says it cannot connect, run <strong>npm run restore</strong> in the project folder.</p>

    <div class="grid">
      <a class="br2" id="br2-link" href="http://localhost:5176/play.html" target="_blank" rel="noopener">
        Baby's Revenge 2
        <span class="sub">Port 5176</span>
        <span class="status" id="br2-status">Checking...</span>
      </a>
      <a class="car" id="car-link" href="http://localhost:5177/index.html" target="_blank" rel="noopener">
        car crashing with dashing
        <span class="sub">Port 5177</span>
        <span class="status" id="car-status">Checking...</span>
      </a>
    </div>

    <button type="button" class="open-all" id="open-all">Open both games in new tabs</button>

    <script>
      const games = [
        { id: 'br2', url: 'http://127.0.0.1:5176/play.html', statusId: 'br2-status' },
        { id: 'car', url: 'http://127.0.0.1:5177/index.html', statusId: 'car-status', play: 'http://localhost:5177/index.html' },
      ];

      async function check(url, el) {
        try {
          const res = await fetch(url, { mode: 'no-cors', cache: 'no-store' });
          el.textContent = 'Ready — click to play';
          el.className = 'status ok';
        } catch {
          el.textContent = 'Not running — run npm run restore';
          el.className = 'status bad';
        }
      }

      games.forEach((g) => check(g.url, document.getElementById(g.statusId)));

      document.getElementById('open-all').addEventListener('click', () => {
        window.open('http://localhost:5176/play.html', '_blank', 'noopener');
        window.open('http://localhost:5177/index.html', '_blank', 'noopener');
      });
    </script>
  </body>
</html>
